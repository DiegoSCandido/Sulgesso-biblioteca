<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca SulGesso</title>

    <!--Styles CSS-->
    <link rel="stylesheet" href="./assets/css/global.css">
    <link rel="stylesheet" href="./assets/css/home.css">
    <!-- Normalize CSS -->
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
    crossorigin="anonymous" referrerpolicy="no-referrer" /> -->
</head>
<body>
    <header>
        <div class="imagem">
            <img src="./img/Logo Sulgesso SA Horizontal_clipdrop-background-removal (1).png" class="img-logo" alt="Logo SulGesso">
        </div>
        <div class="links">
            <a href="./index.html">Home</a>
            <a href="./catalogo.html">Catalogo Online</a>
            <a href="./reserva.html">Reserva</a>
            <a href="./contato.html">Contato</a>
        </div>
        <div class="button">
            <button>Área Restrita</button>
        </div>
    </header>

    <main class="container">
        <section class="bem-vindos">
            <span>Bem Vindos à</span>
            <h1>BIBLIOTECA SULGESSO</h1>
            <p>Uma biblioteca de livros fisicos para todos os colaboradores.<br>
                Nela você vai encontrar, um acervo que vão de livros técnicos até livros infantis.
            </p>
        </section>

        <section class="slider">
            
            <div class="slides">
                <input type="radio" name="radio-btn" id="radio1">
                <input type="radio" name="radio-btn" id="radio2">
                <input type="radio" name="radio-btn" id="radio3">
                <input type="radio" name="radio-btn" id="radio4">
            
                <div class="slide first">
                    <img src="./img/Biblioteca1.jpg" alt="foto biblioteca1">
                </div>
                <div class="slide">
                    <img src="./img/Biblioteca2.jpg" alt="foto biblioteca2">
                </div>
                <div class="slide">
                    <img src="./img/Biblioteca3.jpg" alt="foto biblioteca3">
                </div>
                <div class="slide">
                    <img src="./img/Biblioteca4.jpg" alt="foto biblioteca4">
                </div>

                <div class="navigation-auto">
                    <div class="auto-btn1"></div>
                    <div class="auto-btn2"></div>
                    <div class="auto-btn3"></div>
                    <div class="auto-btn4"></div>
                </div>
            </div>

            <div class="manual-navigation">
                <label for="radio1" class="manual-btn"></label>
                <label for="radio2" class="manual-btn"></label>
                <label for="radio3" class="manual-btn"></label>
                <label for="radio4" class="manual-btn"></label>
            </div>


        </section>
    </main>

    <footer class="rodape">
        <img src="./img/rodape.png" alt="">
    </footer>


<!-- Scrits Javascript -->
    <script src="./assets/js/home.js"></script>
</body>
</html>
