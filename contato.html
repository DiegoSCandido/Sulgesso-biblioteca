<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <!--Styles CSS-->
    <link rel="stylesheet" href="./assets/css/global.css">
    <link rel="stylesheet" href="./assets/css/contato.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <!-- Normalize CSS -->
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"

    crossorigin="anonymous" referrerpolicy="no-referrer" /> -->
</head>
<body>
    <header>
        <div class="imagem">
            <img src="./img/Logo Sulgesso SA Horizontal.png" class="img-logo" alt="Logo SulGesso">
        </div>

        <div class="links">
            <a href="./index.html">Home</a>
            <a href="./catalogo.html">Catalogo Online</a>
            <a href="./reserva.html">Reserva</a>
            <a href="./contato.html">Contato</a>
        </div>
        <div class="button">
            <button>Área Restrita</button>
        </div>

        <!-- Menu burguer -->
        <span class="material-symbols-outlined" id="burguer" onclick="toggleMenu()">menu</span>
        <div class="links-menu">
            <a href="./index.html">Home</a>
            <a href="./catalogo.html">Catalogo Online</a>
            <a href="./reserva.html">Reserva</a>
            <a href="./contato.html">Contato</a>
        </div>

    </header>

    <main class="container">
        <h1>Contato</h1>

        <form action="#" method="post" class="contact-form">
            <label for="name">Nome Completo:</label> <input type="text" name="nome" style="font-size: 12px;" required><br>
            <label for="email">Email:</label> <input type="email" id="email" name="email" style="font-size: 12px;"><br>                 
            <label for="telefone">Telefone:</label> <input type="tel" id="telefone" name="telefone" style="font-size: 12px;" required><br>           
            <label for="mensagem">Dúvidas e Sugestões:</label><textarea id="mensagem" name="mensagem" rows="5" style="font-size: 12px;" required></textarea>

            <button id="form-btn" type="submit">Enviar</button>    
        </form>
            
    </main>

    <footer class="rodape">
        <img src="./img/rodape.png" alt="">
    </footer>


<!-- Scrits Javascript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="./assets/js/script.js"></script>
</body>
